version: '3.8'
services:
  minio:
    image: minio/minio
    container_name: hedgefund-minio
    ports:
      - "9000:9000" # API Port (S3 Traffic)
      - "9001:9001" # Console Port (Web UI)
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  minio_data:
